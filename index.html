<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>发质诊断与洗发水成分推荐</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:20px}
.container{max-width:640px;width:100%}
.card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:32px;margin-bottom:16px}
h1{color:#fff;font-size:22px;text-align:center;margin-bottom:8px}
.subtitle{color:rgba(255,255,255,.45);text-align:center;font-size:13px;margin-bottom:28px}
.q-block{margin-bottom:24px}
.q-label{color:#e0e0ff;font-size:15px;font-weight:600;display:block;margin-bottom:10px}
.q-hint{color:rgba(255,255,255,.35);font-size:12px;margin-left:6px;font-weight:400}
.options{display:flex;flex-wrap:wrap;gap:8px}
.opt-btn{flex:1 1 calc(50% - 4px);min-width:140px}
.opt-btn input{display:none}
.opt-btn label{display:block;padding:12px 14px;border:1px solid rgba(255,255,255,.12);border-radius:10px;color:rgba(255,255,255,.65);text-align:center;cursor:pointer;transition:all .2s;font-size:14px}
.opt-btn input:checked+label{background:rgba(99,102,241,.3);border-color:#818cf8;color:#fff;box-shadow:0 0 12px rgba(99,102,241,.2)}
.opt-btn label:hover{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.05)}
.submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:600;cursor:pointer;transition:all .3s;letter-spacing:1px}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(99,102,241,.4)}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.error-msg{color:#f87171;text-align:center;padding:10px;font-size:14px}

h2{color:#e0e0ff;font-size:16px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.1)}
.pr{display:flex;align-items:center;margin-bottom:10px;gap:12px}
.pr-l{width:70px;color:rgba(255,255,255,.65);font-size:13px;text-align:right}
.pr-w{flex:1;height:22px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden}
.pr-f{height:100%;border-radius:6px;transition:width .6s}
.pr-f.l{background:linear-gradient(90deg,#f59e0b,#fbbf24)}.pr-f.m{background:linear-gradient(90deg,#6366f1,#818cf8)}.pr-f.h{background:linear-gradient(90deg,#10b981,#34d399)}
.pr-v{width:38px;color:rgba(255,255,255,.55);font-size:12px}

.diag-card{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px}
.diag-p{color:#a5b4fc;font-size:26px;font-weight:700;margin-bottom:10px}
.diag-row{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.diag-item{text-align:center}
.diag-n{color:rgba(255,255,255,.45);font-size:12px;margin-bottom:4px}
.diag-s{color:#e0e0ff;font-size:18px;font-weight:700}
.diag-b{width:50px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:5px auto 0;overflow:hidden}
.diag-bf{height:100%;background:#818cf8;border-radius:2px}

.syn-item{color:rgba(255,255,255,.6);font-size:13px;padding:4px 0}.syn-item:before{content:'>> ';color:#fbbf24}

.ing-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);gap:12px}
.ing-i{flex:1;min-width:0}
.ing-n{color:#e0e0ff;font-size:14px;font-weight:600}
.ing-s{display:inline-block;background:rgba(245,158,11,.2);color:#fbbf24;font-size:10px;padding:2px 6px;border-radius:4px;margin-left:6px}
.ing-m{color:rgba(255,255,255,.45);font-size:12px;margin-top:2px}
.ing-src{color:rgba(255,255,255,.3);font-size:11px}
.ing-sc{text-align:right;min-width:65px}
.ing-sv{color:#34d399;font-size:16px;font-weight:700}
.ing-sb{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:3px;overflow:hidden}
.ing-sbf{height:100%;background:#34d399;border-radius:2px}

.chart-row{display:flex;align-items:center;margin-bottom:8px;gap:10px}
.chart-l{width:130px;color:rgba(255,255,255,.55);font-size:13px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-w{flex:1;height:18px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.chart-f{height:100%;border-radius:4px;background:linear-gradient(90deg,#6366f1,#34d399)}
.chart-v{width:38px;color:rgba(255,255,255,.45);font-size:12px}

.avoid-tags{display:flex;flex-wrap:wrap;gap:8px}
.avoid-tag{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.25);color:#fca5a5;padding:5px 14px;border-radius:20px;font-size:13px}

.back-btn{display:block;width:200px;margin:20px auto 0;padding:12px;text-align:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;cursor:pointer;transition:all .2s}
.back-btn:hover{background:rgba(255,255,255,.14);color:#fff}
#survey-pg,#result-pg{display:block}
</style>
</head>
<body>
<div class="container">

<!-- ============ 问卷页 ============ -->
<div id="survey-pg">
<div class="card">

<form id="survey-form"></form>
<div class="error-msg" id="survey-err"></div>
</div>
</div>

// ==================== ENGINE ====================
class HairEngine {
  constructor(answers) {
    this.answers = answers;
    this.raw = {};
    this.profile = {};
    this._extractRaw();
    this._buildProfile();
  }

  _extractRaw() {
    const dims = { oil_level:0, sensitive:0, damage_level:0, dandruff:0, hair_loss:0, hair_thickness:0,
      prefer_clean:0, prefer_moisture:0, prefer_repair:0, prefer_mild:0, prefer_anti_loss:0,
      itchy:0, sting:0, redness:0 };
    for (const q of PAPER_DATA.questions) {
      const choices = this.answers[q.id] || [];
      for (const c of choices) {
        const sc = q.options[c]?.score || {};
        for (const [k, v] of Object.entries(sc)) dims[k] = (dims[k] || 0) + v;
      }
    }
    this.raw = dims;
  }

  _buildProfile() {
    const r = this.raw;
    this.profile.oil_need = +Math.min(r.oil_level / 3 * 0.7 + r.prefer_clean * 0.3, 1).toFixed(2);
    this.profile.moisture_need = +Math.min((1 - r.oil_level / 3) * 0.5 + (r.damage_level / 3) * 0.3 + r.prefer_moisture * 0.2, 1).toFixed(2);
    this.profile.repair_need = +Math.min((r.damage_level / 3) * 0.7 + r.prefer_repair * 0.3, 1).toFixed(2);
    const sens = r.sensitive + r.itchy + r.sting + r.redness;
    this.profile.mild_need = +Math.min(Math.min(sens / 3, 1) * 0.6 + r.prefer_mild * 0.4, 1).toFixed(2);
    this.profile.anti_loss_need = +Math.min((r.hair_loss / 3) * 0.7 + r.prefer_anti_loss * 0.3, 1).toFixed(2);
  }

  isSensitive() { return (this.raw.sensitive + this.raw.itchy + this.raw.sting + this.raw.redness) >= 1; }

  classify() {
    const sc = { oily: 0, dry: 0, normal: 0, damaged: 0 };
    for (const q of PAPER_DATA.questions) {
      for (const c of (this.answers[q.id] || [])) {
        const sm = q.options[c]?.score || {};
        sc.oily += (sm.oil_level || 0) * 2;
        if (sm.oil_level !== undefined) sc.dry += (3 - sm.oil_level);
        sc.damaged += (sm.damage_level || 0) * 2;
        sc.damaged += (sm.prefer_repair || 0) * 2;
        if (sm.damage_level !== undefined) sc.normal += (3 - sm.damage_level);
        if (sm.oil_level >= 1 && sm.oil_level <= 2) sc.normal += 2;
      }
    }
    const primary = Object.entries(sc).sort((a, b) => b[1] - a[1])[0][0];
    const names = { oily: '油性发质', dry: '干性发质', normal: '中性发质', damaged: '受损发质' };
    return { primary, scores: sc, names };
  }

  recommend() {
    const { primary } = this.classify();
    const weights = PAPER_DATA.weights[primary] || PAPER_DATA.weights.normal;
    const sensitive = this.isSensitive();
    const scoresDb = PAPER_DATA.scores;
    const dimMap = { oil_control: 'oil_need', repair: 'repair_need', mildness: 'mild_need',
      moisturizing: 'moisture_need', anti_hair_loss: 'anti_loss_need' };

    let results = [];
    for (const [name, ing] of Object.entries(scoresDb)) {
      if (sensitive && ing.avoid_if_sensitive) continue;
      let score = 0;
      for (const [dim, w] of Object.entries(weights)) {
        const pk = dimMap[dim] || dim;
        const pv = this.profile[pk] || 0.5;
        score += (ing[dim] || 0) * w * (0.5 + 0.5 * pv);
      }
      results.push({ name, score: +score.toFixed(4), dosage_form: ing.dosage_form || '', dosage_note: ing.dosage_note || '', ...ing });
    }
    results.sort((a, b) => b.score - a.score);

    // Synergy
    const force = {};
    for (const rule of (PAPER_DATA.synergy || [])) {
      if (this._triggers(rule.trigger)) {
        for (const ing of rule.force_add) {
          if (results.find(r => r.name === ing)) force[ing] = rule.reason;
        }
      }
    }

    let recs = [];
    const seen = new Set();
    const topN = PAPER_DATA.top_n || 7;
    for (const r of results) {
      if (force[r.name]) { recs.push({ ...r, synergy: force[r.name] }); seen.add(r.name); }
    }
    for (const r of results) {
      if (!seen.has(r.name) && recs.length < topN) { recs.push({ ...r, synergy: null }); seen.add(r.name); }
    }
    return { recs, weights, sensitive, primary, allRanked: results };
  }

  _triggers(cond) {
    if (!cond) return false;
    for (const part of cond.split('and')) {
      const t = part.trim().split(/\s+/);
      if (t.length < 3) continue;
      const [k, op, v] = [t[0], t[1], parseFloat(t[2])];
      if (isNaN(v)) continue;
      const actual = this.raw[k] || 0;
      if (op === '>=' && actual < v) return false;
      if (op === '>' && actual <= v) return false;
      if (op === '<=' && actual > v) return false;
      if (op === '<' && actual >= v) return false;
      if (op === '==' && actual !== v) return false;
    }
    return true;
  }

  triggeredSynergy() {
    return (PAPER_DATA.synergy || []).filter(r => this._triggers(r.trigger));
  }

  avoidList() {
    const items = new Set();
    for (const rule of (PAPER_DATA.rules || [])) {
      try { if (rule.condition && this._triggers(rule.condition)) for (const a of (rule.avoid || [])) items.add(a); }
      catch(e) {}
    }
    return [...items];
  }
}


// ==================== UI ====================
function buildSurvey() {
  const form = document.getElementById('survey-form');
  let html = '';
  for (const q of PAPER_DATA.questions) {
    const m = q.multi ? '<span class="q-hint">(可多选)</span>' : '';
    html += `<div class="q-block"><span class="q-label">${q.id}: ${q.text}${m}</span><div class="options">`;
    for (const [k, o] of Object.entries(q.options)) {
      html += `<div class="opt-btn">
        <input type="${q.multi ? 'checkbox' : 'radio'}" name="${q.id}" id="${q.id}_${k}" value="${k}">
        <label for="${q.id}_${k}">${k}) ${o.label}</label></div>`;
    }
    html += '</div></div>';
  }
  html += '<button type="submit" class="submit-btn">开始分析</button>';
  form.innerHTML = html;

  // Handle multi-select checkbox logic
  form.addEventListener('change', function(e) {
    const inp = e.target;
    if (inp.type !== 'checkbox') return;
    const name = inp.name;
    const all = form.querySelectorAll(`input[name="${name}"]`);
    const noneOpt = Array.from(all).find(o => {
      const lbl = o.parentElement.querySelector('label').textContent;
      return lbl.includes('没有') || lbl.includes('无');
    });
    if (noneOpt && inp === noneOpt && inp.checked) {
      all.forEach(o => { if (o !== noneOpt) o.checked = false; });
    } else if (noneOpt && inp.checked) {
      noneOpt.checked = false;
    }
  });

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const err = document.getElementById('survey-err');
    err.textContent = '';
    const groups = new Set();
    form.querySelectorAll('input[name]').forEach(i => groups.add(i.name));
    let ok = true;
    groups.forEach(name => {
      if (form.querySelectorAll(`input[name="${name}"]:checked`).length === 0) ok = false;
    });
    if (!ok) { err.textContent = '请回答所有问题后再提交'; return; }

    const fd = new FormData(form);
    const answers = {};
    for (const [k, v] of fd.entries()) {
      if (!answers[k]) answers[k] = [];
      answers[k].push(v);
    }

    showResult(answers);
  });
}

function showResult(answers) {
  const engine = new HairEngine(answers);
  const { primary, scores, names } = engine.classify();
  const { recs, weights, sensitive } = engine.recommend();
  const maxDiag = Math.max(...Object.values(scores), 1);
  const dimLabels = { oil_need: '控油需求', moisture_need: '保湿需求', repair_need: '修复需求', mild_need: '温和需求', anti_loss_need: '防脱需求' };
  const papers = {};
  for (const p of (PAPER_DATA.papers || [])) papers[p.id] = p;

  let html = '<h1>发质诊断报告</h1>';

  // Profile
  html += '<div class="card"><h2>用户画像</h2>';
  for (const [k, lbl] of Object.entries(dimLabels)) {
    const v = engine.profile[k];
    const cls = v > 0.6 ? 'h' : (v > 0.3 ? 'm' : 'l');
    html += `<div class="pr"><span class="pr-l">${lbl}</span><div class="pr-w"><div class="pr-f ${cls}" style="width:${v*100}%"></div></div><span class="pr-v">${v.toFixed(2)}</span></div>`;
  }
  if (sensitive) html += '<div style="text-align:center;color:#f87171;font-size:12px;margin-top:8px">!! 检测到头皮敏感，已启用刺激成分过滤</div>';
  html += '</div>';

  // Diagnosis
  html += `<div class="card"><h2>发质分类</h2><div class="diag-card"><div class="diag-p">${names[primary]}</div><div class="diag-row">`;
  for (const [cat, s] of Object.entries(scores)) {
    html += `<div class="diag-item"><div class="diag-n">${names[cat]}</div><div class="diag-s">${s}</div><div class="diag-b"><div class="diag-bf" style="width:${(s/maxDiag*100)}%"></div></div></div>`;
  }
  html += '</div></div></div>';

  // Synergy
  const trig = engine.triggeredSynergy();
  if (trig.length > 0) {
    html += '<div class="card"><h2>协同规则触发</h2>';
    for (const t of trig) html += `<div class="syn-item">${t.reason}</div>`;
    html += '</div>';
  }

  // Recommendations
  html += '<div class="card"><h2>成分推荐</h2>';
  const maxRec = Math.max(...recs.map(r => r.score), 1);
  for (const r of recs) {
    const ing = (PAPER_DATA.ingredients || []).find(i => i.name === r.name) || {};
    const pid = ing.paper_source || '';
    const pi = papers[pid] || {};
    const src = pi.authors ? `${pi.authors} (${pi.year})` : pid;
    const form = r.dosage_form || '';
      const formIcon = {'洗发水': '[SH]', '精华': '[SE]', '两者': '[SH+SE]'}[form] || '';
      html += `<div class="ing-row">
      <div class="ing-i"><div class="ing-n">${r.name}${r.synergy ? '<span class="ing-s">SYNERGY</span>' : ''} <span style="color:rgba(99,102,241,0.6);font-size:10px">${formIcon} ${form}</span></div>
      <div class="ing-m">${ing['功效'] || ''} | ${(ing['适用发质'] || []).join(', ')}</div>
      <div class="ing-src">${src}</div></div>
      <div class="ing-sc"><div class="ing-sv">${r.score.toFixed(2)}</div>
      <div class="ing-sb"><div class="ing-sbf" style="width:${(r.score/maxRec*100)}%"></div></div></div></div>`;
  }
  html += '</div>';

  // Chart
  const allRanked = engine.recommend().allRanked.slice(0, 8);
  html += '<div class="card"><h2>匹配度排行榜</h2>';
  for (const r of allRanked) {
    html += `<div class="chart-row"><span class="chart-l">${r.name}</span><div class="chart-w"><div class="chart-f" style="width:${r.score*100}%"></div></div><span class="chart-v">${r.score.toFixed(2)}</span></div>`;
  }
  html += '</div>';

  // Avoid
  const avoid = engine.avoidList();
  html += '<div class="card"><h2>建议避免成分</h2><div class="avoid-tags">';
  if (avoid.length === 0) html += '<span style="color:rgba(255,255,255,.3)">无特定需避免成分</span>';
  else for (const a of avoid) html += `<span class="avoid-tag">${a}</span>`;
  html += '</div></div>';

  document.getElementById('result-content').innerHTML = html;
  document.getElementById('survey-pg').style.display = 'none';
  document.getElementById('result-pg').style.display = 'block';
  window.scrollTo(0, 0);
}
